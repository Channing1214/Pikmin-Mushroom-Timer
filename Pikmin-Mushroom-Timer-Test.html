<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>搶菇計算機</title>
    <style>
        :root { --primary: #6b8e23; --accent: #ff7f50; --ready: #ff4757; }
        body { font-family: sans-serif; background: #fdfaf6; margin: 0; padding: 110px 5px 120px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; position: relative; }
        body::before { content: ""; position: fixed; inset: 0; background: url('pikmin.png') center/cover; opacity: 0.2; z-index: -1; }

        /* 固定欄位 */
        .time-header, .viz-bar { position: fixed; left: 0; width: 100%; z-index: 3000; box-shadow: 0 0 5px rgba(0,0,0,0.1); background: rgba(253, 250, 246, 0.95); }
        .time-header { top: 0; padding: 5px 0; text-align: center; }
        .viz-bar { bottom: 0; border-top: 2px solid var(--primary); padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); display: flex; gap: 8px; overflow-x: auto; justify-content: center; }
        
        .time-display { font-size: 1.4rem; font-weight: bold; margin: 2px 0; color: #444; }
        .btn-action, .btn-row-clear, .btn-move { border: 1px solid #ddd; border-radius: 4px; cursor: pointer; background: #fff; }
        .btn-action { padding: 2px 10px; font-size: 0.75rem; border-radius: 15px; margin: 0 2px; }

        /* 菇菇列樣式 */
        .container { width: 100%; max-width: 850px; display: flex; flex-direction: column; align-items: center; }
        .mushroom-card { background: rgba(255,255,255,0.85); padding: 3px 10px; border-radius: 8px; margin-bottom: 3px; display: flex; gap: 6px; align-items: center; border: 1px solid #eee; width: fit-content; }
        input { border: 1px solid #ddd; border-radius: 4px; padding: 5px; background: rgba(255,255,255,0.5); }
        input[type="text"] { width: 70px; }
        input[type="number"] { width: 36px; text-align: center; }

        /* 底部方塊 */
        .viz-item { min-width: 80px; height: 80px; background: #fff; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; border-bottom: 3px solid var(--primary); font-size: 0.8rem; }
        .viz-item strong { width: 70px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; }
        .viz-item .viz-cd { color: var(--accent); font-weight: bold; }
        .viz-item.ready { background: var(--ready); animation: blink 1s infinite; }
        .viz-item.ready * { color: #fff !important; }
        @keyframes blink { 50% { opacity: 0.7; } }
        .move-controls { display: flex; flex-direction: column; gap: 1px; }
        .btn-move { font-size: 8px; padding: 0 5px; height: 14px; }
        @media (max-width: 800px) { .viz-bar { justify-content: flex-start; padding-left: 10px; } .viz-bar::-webkit-scrollbar { display: none; } }
    </style>
</head>
<body>

<div class="time-header">
    <h1 style="font-size:1.1rem; margin:0; color:var(--primary);">🍄 搶菇計算機 🍄</h1>
    <div id="currentTime" class="time-display">--:--:--</div>
    <button class="btn-action" onclick="changeRows(1)">➕ 增加</button>
    <button class="btn-action" onclick="changeRows(-1)">➖ 減少</button>
    <button class="btn-action" onclick="resetToInitial()">🔄 重置</button>
</div>

<div id="app" class="container"></div>
<div id="viz" class="viz-bar"></div>

<script>
    const app = document.getElementById('app'), viz = document.getElementById('viz'), ctx = new (window.AudioContext || window.webkitAudioContext)();
    let targets = {}, rows = parseInt(localStorage.getItem('rows')) || 5;

    function beep() { if(ctx.state==='suspended')ctx.resume(); const o=ctx.createOscillator(), g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value=1000; g.gain.value=0.15; o.start(); setTimeout(()=>o.stop(), 500); }

    function init() {
        app.innerHTML = "";
        for(let i=1; i<=rows; i++) {
            const d = document.createElement('div'); d.className='mushroom-card'; d.id=`card${i}`; d.dataset.id=i;
            d.innerHTML = `<input type="text" id="n${i}" value="${localStorage.getItem(`n${i}`)||'菇菇'+i}" oninput="localStorage.setItem('n${i}',this.value);upd()">
                <span>剩</span><input type="number" id="m${i}" placeholder="分" oninput="h(${i})">分<input type="number" id="s${i}" placeholder="秒" oninput="h(${i})">秒
                <button class="btn-row-clear" onclick="clr(${i})">✖</button>
                <div class="move-controls"><button class="btn-move" onclick="mv(${i},-1)">▲</button><button class="btn-move" onclick="mv(${i},1)">▼</button></div>`;
            app.appendChild(d);
        }
        upd();
    }

    function h(id) { 
        const m=document.getElementById(`m${id}`), s=document.getElementById(`s${id}`);
        if(s.value > 59) s.value = 59;
        targets[id] = (m.value||s.value) ? new Date(Date.now() + ( (m.value||0)*60 + (s.value*1||0) + 300)*1000) : null;
        document.getElementById(`card${id}`).dataset.w = ""; upd();
    }

    function upd() {
        const now = new Date();
        document.getElementById('currentTime').innerText = now.toLocaleTimeString('zh-TW', {hour12:false});
        viz.innerHTML = Array.from(app.children).map(c => {
            const id=c.dataset.id, t=targets[id], name=document.getElementById(`n${id}`).value;
            let cd="等待", ready=false, targetStr="--:--:--";
            if(t) {
                const diff = Math.floor((t-now)/1000);
                ready = diff <= 0;
                cd = ready ? "已發車" : `${Math.floor(Math.abs(diff)/60)}:${(Math.abs(diff)%60).toString().padStart(2,'0')}`;
                targetStr = t.toLocaleTimeString('zh-TW', {hour12:false});
                if(diff===10 && !c.dataset.w) { beep(); c.dataset.w="1"; }
            }
            return `<div class="viz-item ${ready?'ready':''}"><strong>${name}</strong><span style="font-size:0.7rem;color:#888">${targetStr}</span><span class="viz-cd">${cd}</span></div>`;
        }).join('');
    }

    function clr(id) { document.getElementById(`m${id}`).value=document.getElementById(`s${id}`).value=""; targets[id]=null; upd(); }
    function changeRows(d) { rows=Math.max(1,rows+d); localStorage.setItem('rows',rows); init(); }
    function resetToInitial() { if(confirm("重置嗎?")){localStorage.clear(); rows=5; targets={}; init();} }
    function mv(id, d) { const c=document.getElementById(`card${id}`), nodes=Array.from(app.children), i=nodes.indexOf(c); if(d===-1&&i>0)app.insertBefore(c, nodes[i-1]); else if(d===1&&i<nodes.length-1)app.insertBefore(nodes[i+1], c); upd(); }

    setInterval(upd, 1000); init();
</script>
</body>
</html>
